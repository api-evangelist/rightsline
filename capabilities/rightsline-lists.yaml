naftiko: 1.0.0-alpha2
info:
  label: Rightsline API — Lists
  description: 'Rightsline API — Lists. 2 operations. Lead operation: Add List Value. Self-contained Naftiko capability covering
    one Rightsline business surface.'
  tags:
  - Rightsline
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RIGHTSLINE_API_KEY: RIGHTSLINE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rightsline-lists
    baseUri: https://app.rightsline.com/v4
    description: Rightsline API — Lists business capability. Self-contained, no shared references.
    resources:
    - name: lists-listId-values
      path: /lists/{listId}/values
      operations:
      - name: addlistvalue
        method: POST
        description: Add List Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: listId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removelistvalue
        method: DELETE
        description: Remove List Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: listId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RIGHTSLINE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rightsline-lists-rest
    port: 8080
    description: REST adapter for Rightsline API — Lists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/lists/{listid}/values
      name: lists-listid-values
      description: REST surface for lists-listId-values.
      operations:
      - method: POST
        name: addlistvalue
        description: Add List Value
        call: rightsline-lists.addlistvalue
        with:
          listId: rest.listId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removelistvalue
        description: Remove List Value
        call: rightsline-lists.removelistvalue
        with:
          listId: rest.listId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rightsline-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rightsline API — Lists. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: add-list-value
      description: Add List Value
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: rightsline-lists.addlistvalue
      with:
        listId: tools.listId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-list-value
      description: Remove List Value
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rightsline-lists.removelistvalue
      with:
        listId: tools.listId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
