naftiko: 1.0.0-alpha2
info:
  label: Rightsline API — Royalties
  description: 'Rightsline API — Royalties. 2 operations. Lead operation: List Royalties. Self-contained Naftiko capability
    covering one Rightsline business surface.'
  tags:
  - Rightsline
  - Royalties
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RIGHTSLINE_API_KEY: RIGHTSLINE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rightsline-royalties
    baseUri: https://app.rightsline.com/v4
    description: Rightsline API — Royalties business capability. Self-contained, no shared references.
    resources:
    - name: royalties
      path: /royalties
      operations:
      - name: listroyalties
        method: GET
        description: List Royalties
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createroyalty
        method: POST
        description: Create Royalty
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RIGHTSLINE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rightsline-royalties-rest
    port: 8080
    description: REST adapter for Rightsline API — Royalties. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/royalties
      name: royalties
      description: REST surface for royalties.
      operations:
      - method: GET
        name: listroyalties
        description: List Royalties
        call: rightsline-royalties.listroyalties
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createroyalty
        description: Create Royalty
        call: rightsline-royalties.createroyalty
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rightsline-royalties-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rightsline API — Royalties. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-royalties
      description: List Royalties
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rightsline-royalties.listroyalties
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: create-royalty
      description: Create Royalty
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rightsline-royalties.createroyalty
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
