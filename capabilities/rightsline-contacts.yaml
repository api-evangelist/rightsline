naftiko: 1.0.0-alpha2
info:
  label: Rightsline API — Contacts
  description: 'Rightsline API — Contacts. 2 operations. Lead operation: List Contacts. Self-contained Naftiko capability
    covering one Rightsline business surface.'
  tags:
  - Rightsline
  - Contacts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RIGHTSLINE_API_KEY: RIGHTSLINE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rightsline-contacts
    baseUri: https://app.rightsline.com/v4
    description: Rightsline API — Contacts business capability. Self-contained, no shared references.
    resources:
    - name: contacts
      path: /contacts
      operations:
      - name: listcontacts
        method: GET
        description: List Contacts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: offset
          in: query
          type: integer
      - name: createcontact
        method: POST
        description: Create Contact
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RIGHTSLINE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rightsline-contacts-rest
    port: 8080
    description: REST adapter for Rightsline API — Contacts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/contacts
      name: contacts
      description: REST surface for contacts.
      operations:
      - method: GET
        name: listcontacts
        description: List Contacts
        call: rightsline-contacts.listcontacts
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcontact
        description: Create Contact
        call: rightsline-contacts.createcontact
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rightsline-contacts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rightsline API — Contacts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-contacts
      description: List Contacts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rightsline-contacts.listcontacts
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: create-contact
      description: Create Contact
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rightsline-contacts.createcontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
