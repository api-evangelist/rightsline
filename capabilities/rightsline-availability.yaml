naftiko: 1.0.0-alpha2
info:
  label: Rightsline API — Availability
  description: 'Rightsline API — Availability. 1 operations. Lead operation: Check Availability. Self-contained Naftiko capability
    covering one Rightsline business surface.'
  tags:
  - Rightsline
  - Availability
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RIGHTSLINE_API_KEY: RIGHTSLINE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rightsline-availability
    baseUri: https://app.rightsline.com/v4
    description: Rightsline API — Availability business capability. Self-contained, no shared references.
    resources:
    - name: availability
      path: /availability
      operations:
      - name: checkavailability
        method: GET
        description: Check Availability
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: contentId
          in: query
          type: string
          description: Content identifier
          required: true
        - name: territory
          in: query
          type: string
          description: Territory code (ISO 3166-1 alpha-2)
        - name: platform
          in: query
          type: string
          description: Distribution platform
        - name: startDate
          in: query
          type: string
          description: Start date for availability window check
        - name: endDate
          in: query
          type: string
          description: End date for availability window check
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RIGHTSLINE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rightsline-availability-rest
    port: 8080
    description: REST adapter for Rightsline API — Availability. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/availability
      name: availability
      description: REST surface for availability.
      operations:
      - method: GET
        name: checkavailability
        description: Check Availability
        call: rightsline-availability.checkavailability
        with:
          contentId: rest.contentId
          territory: rest.territory
          platform: rest.platform
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rightsline-availability-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rightsline API — Availability. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: check-availability
      description: Check Availability
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rightsline-availability.checkavailability
      with:
        contentId: tools.contentId
        territory: tools.territory
        platform: tools.platform
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
