naftiko: 1.0.0-alpha2
info:
  label: Rightsline Rights and Royalties Management
  description: Unified capability for Rightsline rights and royalties management. Enables rights licensing workflows, content
    availability checking, royalty tracking, workflow automation, and audit trail access for media and entertainment rights
    management teams.
  tags:
  - Availability
  - Content Management
  - Entertainment
  - Media
  - Rights Management
  - Rightsline
  - Royalties
  - Workflows
  created: '2026-05-02'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    RIGHTSLINE_API_KEY: RIGHTSLINE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rightsline-rights
    baseUri: https://app.rightsline.com/v4
    description: Rightsline Rights API for rights, availability, and workflow management.
    authentication:
      type: bearer
      token: '{{RIGHTSLINE_API_KEY}}'
    resources:
    - name: rights
      path: /rights
      description: Rights and license records
      operations:
      - name: list-rights
        method: GET
        description: List rights records with pagination
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Records per page (max 100)
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset
        - name: modifiedAfter
          in: query
          type: string
          required: false
          description: Filter by modification date
        outputRawFormat: json
        outputParameters:
        - name: rights
          type: object
          value: $.
      - name: create-right
        method: POST
        description: Create a new rights record
        outputRawFormat: json
        outputParameters:
        - name: right
          type: object
          value: $.
        body:
          type: json
          data:
            contentId: '{{tools.contentId}}'
            territory: '{{tools.territory}}'
            platform: '{{tools.platform}}'
            startDate: '{{tools.startDate}}'
            endDate: '{{tools.endDate}}'
      - name: get-right
        method: GET
        description: Get a rights record by ID
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Rights record ID
        outputRawFormat: json
        outputParameters:
        - name: right
          type: object
          value: $.
      - name: update-right
        method: PUT
        description: Update an existing rights record
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Rights record ID
        outputRawFormat: json
        outputParameters:
        - name: right
          type: object
          value: $.
        body:
          type: json
          data:
            territory: '{{tools.territory}}'
            platform: '{{tools.platform}}'
            endDate: '{{tools.endDate}}'
      - name: delete-right
        method: DELETE
        description: Delete a rights record
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: Rights record ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: availability
      path: /availability
      description: Content availability checking
      operations:
      - name: check-availability
        method: GET
        description: Check content availability for a territory, platform, and time window
        inputParameters:
        - name: contentId
          in: query
          type: string
          required: true
          description: Content identifier
        - name: territory
          in: query
          type: string
          required: false
          description: Territory code
        - name: platform
          in: query
          type: string
          required: false
          description: Distribution platform
        - name: startDate
          in: query
          type: string
          required: false
          description: Window start date
        - name: endDate
          in: query
          type: string
          required: false
          description: Window end date
        outputRawFormat: json
        outputParameters:
        - name: availability
          type: object
          value: $.
    - name: workflows
      path: /workflows
      description: Workflow automation
      operations:
      - name: execute-workflow-action
        method: POST
        description: Execute a workflow action on up to 100 records
        inputParameters:
        - name: workflowId
          in: path
          type: string
          required: true
          description: Workflow ID
        outputRawFormat: json
        outputParameters:
        - name: results
          type: object
          value: $.
        body:
          type: json
          data:
            recordIds: '{{tools.recordIds}}'
    - name: audit
      path: /audit
      description: Audit trail
      operations:
      - name: get-audit-trail
        method: GET
        description: Get audit history for a record
        inputParameters:
        - name: recordId
          in: path
          type: string
          required: true
          description: Record ID
        outputRawFormat: json
        outputParameters:
        - name: audit
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: rightsline-management-api
    description: Unified REST API for Rightsline rights, royalties, and availability management.
    resources:
    - path: /v1/rights
      name: rights
      description: Rights and license management
      operations:
      - method: GET
        name: list-rights
        description: List rights and license records
        call: rightsline-rights.list-rights
        with:
          limit: rest.limit
          offset: rest.offset
          modifiedAfter: rest.modifiedAfter
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/rights/{id}
      name: right
      description: Individual rights record
      operations:
      - method: GET
        name: get-right
        description: Get rights record by ID
        call: rightsline-rights.get-right
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-right
        description: Update a rights record
        call: rightsline-rights.update-right
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-right
        description: Delete a rights record
        call: rightsline-rights.delete-right
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/availability
      name: availability
      description: Content availability checking
      operations:
      - method: GET
        name: check-availability
        description: Validate content availability for a territory and platform
        call: rightsline-rights.check-availability
        with:
          contentId: rest.contentId
          territory: rest.territory
          platform: rest.platform
          startDate: rest.startDate
          endDate: rest.endDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workflows/{workflowId}/actions
      name: workflow-actions
      description: Workflow automation
      operations:
      - method: POST
        name: execute-workflow-action
        description: Execute workflow action on records
        call: rightsline-rights.execute-workflow-action
        with:
          workflowId: rest.workflowId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/audit/{recordId}
      name: audit
      description: Audit trail
      operations:
      - method: GET
        name: get-audit-trail
        description: Get record change history
        call: rightsline-rights.get-audit-trail
        with:
          recordId: rest.recordId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: rightsline-management-mcp
    transport: http
    description: MCP server for AI-assisted rights management and availability validation workflows.
    tools:
    - name: list-rights
      description: List rights and license records, optionally filtered by modification date
      hints:
        readOnly: true
        openWorld: true
      call: rightsline-rights.list-rights
      with:
        limit: tools.limit
        offset: tools.offset
        modifiedAfter: tools.modifiedAfter
      outputParameters:
      - type: object
        mapping: $.
    - name: get-right
      description: Get full details of a rights or license record including territory and window
      hints:
        readOnly: true
        openWorld: true
      call: rightsline-rights.get-right
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-right
      description: Create a new rights record for a content title, territory, and platform
      hints:
        readOnly: false
        destructive: false
      call: rightsline-rights.create-right
      with:
        contentId: tools.contentId
        territory: tools.territory
        platform: tools.platform
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: update-right
      description: Update an existing rights record's terms, dates, or territory
      hints:
        readOnly: false
        idempotent: true
      call: rightsline-rights.update-right
      with:
        id: tools.id
        territory: tools.territory
        platform: tools.platform
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-right
      description: Delete a rights record
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rightsline-rights.delete-right
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: check-availability
      description: Check whether content is available for distribution in a territory and platform window
      hints:
        readOnly: true
        openWorld: true
      call: rightsline-rights.check-availability
      with:
        contentId: tools.contentId
        territory: tools.territory
        platform: tools.platform
        startDate: tools.startDate
        endDate: tools.endDate
      outputParameters:
      - type: object
        mapping: $.
    - name: execute-workflow
      description: Execute a Rightsline workflow action on one or more records (e.g., generate delivery request)
      hints:
        readOnly: false
        destructive: false
      call: rightsline-rights.execute-workflow-action
      with:
        workflowId: tools.workflowId
        recordIds: tools.recordIds
      outputParameters:
      - type: object
        mapping: $.
    - name: get-audit-trail
      description: Get the change history and audit trail for a specific rights or royalty record
      hints:
        readOnly: true
        openWorld: true
      call: rightsline-rights.get-audit-trail
      with:
        recordId: tools.recordId
      outputParameters:
      - type: object
        mapping: $.
