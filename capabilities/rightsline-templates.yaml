naftiko: 1.0.0-alpha2
info:
  label: Rightsline API — Templates
  description: 'Rightsline API — Templates. 2 operations. Lead operation: List Templates. Self-contained Naftiko capability
    covering one Rightsline business surface.'
  tags:
  - Rightsline
  - Templates
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RIGHTSLINE_API_KEY: RIGHTSLINE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rightsline-templates
    baseUri: https://app.rightsline.com/v4
    description: Rightsline API — Templates business capability. Self-contained, no shared references.
    resources:
    - name: templates-entityType
      path: /templates/{entityType}
      operations:
      - name: listtemplates
        method: GET
        description: List Templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entityType
          in: path
          type: string
          description: Entity type (e.g., rights, royalties, contacts)
          required: true
    - name: templates-entityType-templateId
      path: /templates/{entityType}/{templateId}
      operations:
      - name: gettemplate
        method: GET
        description: Get Template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: entityType
          in: path
          type: string
          required: true
        - name: templateId
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.RIGHTSLINE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rightsline-templates-rest
    port: 8080
    description: REST adapter for Rightsline API — Templates. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/templates/{entitytype}
      name: templates-entitytype
      description: REST surface for templates-entityType.
      operations:
      - method: GET
        name: listtemplates
        description: List Templates
        call: rightsline-templates.listtemplates
        with:
          entityType: rest.entityType
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/templates/{entitytype}/{templateid}
      name: templates-entitytype-templateid
      description: REST surface for templates-entityType-templateId.
      operations:
      - method: GET
        name: gettemplate
        description: Get Template
        call: rightsline-templates.gettemplate
        with:
          entityType: rest.entityType
          templateId: rest.templateId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rightsline-templates-mcp
    port: 9090
    transport: http
    description: MCP adapter for Rightsline API — Templates. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-templates
      description: List Templates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rightsline-templates.listtemplates
      with:
        entityType: tools.entityType
      outputParameters:
      - type: object
        mapping: $.
    - name: get-template
      description: Get Template
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rightsline-templates.gettemplate
      with:
        entityType: tools.entityType
        templateId: tools.templateId
      outputParameters:
      - type: object
        mapping: $.
