aid: rightsline
name: Rightsline
description: >-
  Rightsline is the leading rights and royalties software platform for media,
  entertainment, and content businesses. Its REST API enables real-time
  integration of contacts, product catalogs, revenue data, and workflow
  automation for rights tracking, availability, royalty calculations, and
  vendor delivery across the content lifecycle.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Content Management
  - Entertainment
  - Media
  - Rights Management
  - Royalties
url: >-
  https://raw.githubusercontent.com/api-evangelist/rightsline/refs/heads/main/apis.yml
created: '2025-02-08'
modified: '2026-05-02'
specificationVersion: '0.19'
apis:
  - aid: rightsline:rights-api
    name: Rightsline Rights API
    description: >-
      RESTful API for managing rights, licenses, and availability data.
      Supports creation, retrieval, modification, and deletion of up to 100
      records per request. Enables automation of rights tracking, availability
      validation, vendor delivery requests, and workflow actions.
    humanURL: https://api-docs.rightsline.com/
    baseURL: https://app.rightsline.com/v4
    tags:
      - Availability
      - Content
      - Rights Management
      - Workflows
    properties:
      - type: Documentation
        url: https://api-docs.rightsline.com/
      - type: PostmanWorkspace
        url: https://postman.rightsline.com/
      - type: Authentication
        url: https://api-docs.rightsline.com/authentication/user-permissions
  - aid: rightsline:royalties-api
    name: Rightsline Royalties API
    description: >-
      RESTful API for managing royalties, revenue data, and financial workflows.
      Supports bulk loading of revenue, sales, and usage data. Enables
      automation of finance billing requests and royalty calculations.
    humanURL: https://api-docs.rightsline.com/
    baseURL: https://app.rightsline.com/v4
    tags:
      - Billing
      - Finance
      - Revenue
      - Royalties
    properties:
      - type: Documentation
        url: https://api-docs.rightsline.com/
      - type: PostmanWorkspace
        url: https://postman.rightsline.com/
